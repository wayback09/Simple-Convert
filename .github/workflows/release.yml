name: Build & Release (Windows)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'           # also trigger on version tags like v1.0.0
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write      # needed to create GitHub Releases

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Go ──────────────────────────────────────────────────
      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      # ── 3. Install Wails CLI ──────────────────────────────────────────
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # ── 4. Verify Wails install ────────────────────────────────────────
      - name: Wails doctor
        run: wails doctor

      # ── 5. Build (production, no debug console) ────────────────────────
      #
      #   -nsis        → also build an NSIS installer (.exe setup wizard)
      #   -windowsgui  → no console window on launch
      #   -trimpath    → smaller binary
      #   -ldflags     → strip debug symbols for smallest possible file
      #
      - name: Build production binary
        run: |
          wails build `
            -platform windows/amd64 `
            -trimpath `
            -ldflags "-s -w"

      # ── 6. Derive version string ───────────────────────────────────────
      #   Priority: git tag → commit SHA prefix
      - name: Resolve version
        id: version
        shell: bash
        run: |
          TAG=$(git describe --tags --exact-match 2>/dev/null || true)
          if [ -n "$TAG" ]; then
            echo "value=$TAG" >> $GITHUB_OUTPUT
          else
            SHA=$(git rev-parse --short HEAD)
            echo "value=dev-${SHA}" >> $GITHUB_OUTPUT
          fi

      # ── 7. Rename artifact ────────────────────────────────────────────
      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "build/bin/simple-convert.exe" "dist/Simple-Convert-${{ steps.version.outputs.value }}-windows-amd64.exe"

      # ── 8. Upload build artifact (always available in Actions tab) ────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Simple-Convert-windows-${{ steps.version.outputs.value }}
          path: dist/Simple-Convert-*.exe
          retention-days: 30

      # ── 9. Create / update GitHub Release (only on tagged pushes) ─────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Simple Convert ${{ steps.version.outputs.value }}
          tag_name: ${{ steps.version.outputs.value }}
          draft: false
          prerelease: false
          generate_release_notes: true   # auto-generates changelog from commits
          files: dist/Simple-Convert-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
